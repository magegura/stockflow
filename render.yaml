databases:
  - name: stockflow-db
    databaseName: stockflow
    user: stockflow

services:
  - type: web
    name: stockflow-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
