version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: stockflow-db
    environment:
      POSTGRES_DB: stockflow
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockflow -d stockflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: stockflow-backend
    environment:
      JWT_SECRET: super-secret-change-me
      DATABASE_URL: postgresql+psycopg://stockflow:stockflow@db:5432/stockflow
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: stockflow-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
